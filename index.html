<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Espetos - Gestão Realtime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 font-sans">

    <!-- ÁUDIO DE ALERTA (URL de um bip padrão) -->
    <audio id="audio-alerta" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <!-- TELA DE LOGIN -->
    <div id="tela-login" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm">
            <h2 class="text-3xl font-bold mb-6 text-center">JS Espetos</h2>
            <select id="login-perfil" class="w-full border p-3 rounded-lg mb-4 outline-none">
                <option value="adm">Administrador (ADM)</option>
                <option value="garcon">Garçom</option>
                <option value="cozinha">Cozinha</option>
                <option value="churrasqueira">Churrasqueira</option>
            </select>
            <button onclick="fazerLogin()" class="bg-blue-600 text-white w-full py-3 rounded-lg font-bold">ENTRAR NO SISTEMA</button>
        </div>
    </div>

    <!-- NAVBAR -->
    <nav id="nav-principal" class="bg-slate-800 text-white p-4 shadow-md hidden flex justify-between items-center overflow-x-auto">
        <span class="font-bold text-orange-400 mr-4">JS ESPETOS</span>
        <div class="flex gap-4 text-sm">
            <button onclick="mudarAba('mesas')" class="btn-menu hidden" id="menu-mesas">MESAS</button>
            <button onclick="mudarAba('cozinha')" class="btn-menu hidden" id="menu-cozinha">COZINHA</button>
            <button onclick="mudarAba('churrasqueira')" class="btn-menu hidden" id="menu-churras">CHURRASCO</button>
            <button onclick="mudarAba('estoque')" class="btn-menu hidden" id="menu-estoque">ESTOQUE</button>
            <button onclick="window.location.reload()" class="text-red-400 ml-4">SAIR</button>
        </div>
    </nav>

    <!-- CONTEÚDO -->
    <main id="conteudo-sistema" class="p-4 hidden max-w-7xl mx-auto">
        
        <!-- ABA: MESAS (Visível para ADM e Garçom) -->
        <div id="aba-mesas" class="aba hidden">
            <div class="flex justify-between mb-6 items-center">
                <h2 class="text-2xl font-bold">Mesas Ativas</h2>
                <button onclick="addMesa()" class="bg-blue-600 text-white px-4 py-2 rounded shadow">+ Mesa</button>
            </div>
            <div id="lista-mesas" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 text-center"></div>
        </div>

        <!-- ABA: COZINHA / CHURRASQUEIRA -->
        <div id="aba-producao" class="aba hidden">
            <h2 id="titulo-producao" class="text-2xl font-bold mb-6 text-slate-800">Pedidos em Aberto</h2>
            <div id="lista-pedidos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- Pedidos Realtime entram aqui -->
            </div>
        </div>

        <!-- ABA: ESTOQUE (ADM) -->
        <div id="aba-estoque" class="aba hidden">
             <!-- (Seu código anterior de estoque continua aqui dentro) -->
             <h2 class="text-2xl font-bold mb-4">Gerenciar Estoque</h2>
             <p class="text-gray-500 italic">Funcionalidade de edição e cadastro habilitada para ADM.</p>
        </div>

    </main>

    <script>
        const SUPABASE_URL = "https://wogwftbhfiibzftdrfwg.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndvZ3dmdGJoZmlpYnpmdGRyZndnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMDc0ODcsImV4cCI6MjA5Mzg4MzQ4N30.NRUZVrfJVqRJeXRSpMcV-V9H5oxJJfU2QsSkcDURisk";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let perfilLogado = "";

        // LOGIN COM PERMISSÕES
        function fazerLogin() {
            perfilLogado = document.getElementById('login-perfil').value;
            document.getElementById('tela-login').classList.add('hidden');
            document.getElementById('nav-principal').classList.remove('hidden');
            document.getElementById('conteudo-sistema').classList.remove('hidden');

            // Controla o que cada um vê no menu
            if (perfilLogado === 'adm') {
                document.querySelectorAll('.btn-menu').forEach(b => b.classList.remove('hidden'));
                mudarAba('mesas');
            } else if (perfilLogado === 'garcon') {
                document.getElementById('menu-mesas').classList.remove('hidden');
                mudarAba('mesas');
            } else if (perfilLogado === 'cozinha') {
                document.getElementById('menu-cozinha').classList.remove('hidden');
                mudarAba('cozinha');
            } else if (perfilLogado === 'churrasqueira') {
                document.getElementById('menu-churras').classList.remove('hidden');
                mudarAba('churrasqueira');
            }
        }

        function mudarAba(aba) {
            document.querySelectorAll('.aba').forEach(d => d.classList.add('hidden'));
            
            if (aba === 'cozinha' || aba === 'churrasqueira') {
                document.getElementById('aba-producao').classList.remove('hidden');
                document.getElementById('titulo-producao').innerText = "Produção: " + aba.toUpperCase();
                escutarPedidos(aba);
            } else {
                document.getElementById('aba-' + aba).classList.remove('hidden');
            }

            if(aba === 'mesas') carregarMesas();
        }

        // --- LÓGICA DE PRODUÇÃO REALTIME ---
        async function escutarPedidos(setor) {
            // Carrega pedidos iniciais
            carregarPedidos(setor);

            // Escuta mudanças no banco de dados (REALTIME)
            _supabase
                .channel('pedidos-alterados')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'pedidos' }, () => {
                    carregarPedidos(setor);
                    tocarAlerta();
                })
                .subscribe();
        }

        async function carregarPedidos(setor) {
            const { data } = await _supabase
                .from('pedidos')
                .select('*')
                .eq('setor', setor)
                .neq('status', 'finalizado'); // Não mostra os que já saíram da cozinha

            const lista = document.getElementById('lista-pedidos');
            lista.innerHTML = '';

            data?.forEach(ped => {
                const bgCard = ped.status === 'pendente' ? 'bg-orange-100 border-orange-500' : 'bg-blue-100 border-blue-500';
                lista.innerHTML += `
                    <div class="p-4 rounded-xl border-l-8 shadow-md ${bgCard}">
                        <div class="flex justify-between font-bold">
                            <span>MESA ${ped.mesa_id}</span>
                            <span class="text-xs uppercase">${ped.status}</span>
                        </div>
                        <p class="text-lg my-2 font-black">${ped.item_nome}</p>
                        <div class="flex gap-2">
                            ${ped.status === 'pendente' ? 
                                `<button onclick="alterarStatusPedido(${ped.id}, 'preparando')" class="bg-orange-500 text-white flex-1 py-2 rounded font-bold">ACEITAR</button>` : 
                                `<button onclick="alterarStatusPedido(${ped.id}, 'finalizado')" class="bg-green-600 text-white flex-1 py-2 rounded font-bold">PRONTO / FINALIZAR</button>`
                            }
                        </div>
                    </div>
                `;
            });
        }

        async function alterarStatusPedido(id, novoStatus) {
            await _supabase.from('pedidos').update({ status: novoStatus }).eq('id', id);
            // O realtime já vai atualizar a tela automaticamente
        }

        function tocarAlerta() {
            const audio = document.getElementById('audio-alerta');
            audio.play().catch(e => console.log("Áudio bloqueado pelo navegador até o primeiro clique."));
        }

        // --- RESTANTE DAS FUNÇÕES (MESAS / ESTOQUE) ---
        // (Mantenha as funções carregarMesas, salvarProduto etc do passo anterior aqui)
    </script>
</body>
</html>
